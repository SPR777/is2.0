<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHS Schedule AI – โรงเรียนเฉลิมขวัญสตรี</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #122040;
      --navy-light: #1a3a6e;
      --navy-border: #1e4080;
      --accent: #2563eb;
      --accent-light: #3b82f6;
      --white: #ffffff;
      --off-white: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-400: #94a3b8;
      --gray-600: #475569;
      --navy-glass: rgba(10,22,40,0.85);
      --gold: #f5c542;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #122040 50%, #0f2a5e 100%);
      min-height: 100vh;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── HEADER ─── */
    header {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 20px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }

    .lang-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
    }

    .lang-btn button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .lang-btn button.active,
    .lang-btn button:hover {
      background: var(--accent);
      border-color: var(--accent-light);
      color: white;
    }

    .logo-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: white;
      padding: 4px;
      box-shadow: 0 0 40px rgba(37,99,235,0.4), 0 8px 32px rgba(0,0,0,0.4);
      margin-bottom: 14px;
      overflow: hidden;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    /* fallback school crest if image fails */
    .logo-fallback {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a3a6e, #0a1628);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.5px;
      color: white;
    }

    header p.subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
      text-align: center;
    }

    .time-display {
      margin-top: 10px;
      background: rgba(37,99,235,0.15);
      border: 1px solid rgba(37,99,235,0.3);
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 13px;
      color: #93c5fd;
    }

    /* ─── MAIN ─── */
    main {
      width: 100%;
      max-width: 760px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 16px;
    }

    /* ─── CHAT ─── */
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 300px;
      max-height: 55vh;
    }

    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-track { background: transparent; }
    #chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .avatar.ai-avatar {
      background: linear-gradient(135deg, #1e40af, #2563eb);
      box-shadow: 0 0 12px rgba(37,99,235,0.4);
    }

    .avatar.user-avatar {
      background: linear-gradient(135deg, #374151, #1f2937);
    }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.65;
    }

    .msg.ai .bubble {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-top-left-radius: 4px;
    }

    .msg.user .bubble {
      background: linear-gradient(135deg, #1e40af, #1d4ed8);
      border-top-right-radius: 4px;
    }

    /* result card */
    .result-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 10px;
    }

    .result-card .subject {
      font-size: 20px;
      font-weight: 700;
      color: #93c5fd;
      margin-bottom: 4px;
    }

    .result-card .detail {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 2px;
    }

    .result-card .detail span {
      color: rgba(255,255,255,0.85);
    }

    .period-badge {
      display: inline-block;
      background: rgba(37,99,235,0.25);
      border: 1px solid rgba(37,99,235,0.4);
      color: #93c5fd;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    /* suggestions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .suggest-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .suggest-btn:hover {
      background: rgba(37,99,235,0.25);
      border-color: rgba(37,99,235,0.5);
      color: white;
    }

    /* typing indicator */
    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 4px 0;
    }

    .typing-dots span {
      width: 8px; height: 8px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      animation: dot 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ─── INPUT AREA ─── */
    .input-area {
      padding: 16px 0 28px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.14);
      border-radius: 28px;
      padding: 6px 8px 6px 20px;
      gap: 8px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: rgba(37,99,235,0.6);
      background: rgba(255,255,255,0.09);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 15px;
      font-family: inherit;
      padding: 6px 0;
      resize: none;
    }

    #user-input::placeholder { color: rgba(255,255,255,0.35); }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e40af, #2563eb);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    #send-btn:hover { background: linear-gradient(135deg, #1d4ed8, #3b82f6); transform: scale(1.05); }
    #send-btn:active { transform: scale(0.97); }

    #send-btn svg { width: 18px; height: 18px; fill: white; }

    .hint-text {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      margin-top: 10px;
    }

    /* ─── NO SCHOOL ─── */
    .no-class-badge {
      display: inline-block;
      background: rgba(245,197,66,0.12);
      border: 1px solid rgba(245,197,66,0.3);
      color: #fcd34d;
      padding: 6px 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-top: 8px;
    }

    @media (max-width: 520px) {
      header h1 { font-size: 16px; }
      .logo-wrap { width: 70px; height: 70px; }
      .bubble { font-size: 14px; }
    }
  </style>
</head>

<header>

// ══════════════════════════════════════════════════
//  TIME UTILITIES  (Thailand = UTC+7)
// ══════════════════════════════════════════════════
function getThaiTime() {
  const now = new Date();
  const thai = new Date(now.getTime() + (7 * 60 - now.getTimezoneOffset()) * 60000);
  return thai;
}

function getCurrentPeriod() {
  const t = getThaiTime();
  const h = t.getHours(), m = t.getMinutes();
  const mins = h * 60 + m;
  const slots = [
    [8*60+20, 9*60+20, 1],
    [9*60+20, 10*60+20, 2],
    [10*60+20, 11*60+20, 3],
    [11*60+20, 12*60+10, 4],
    [12*60+10, 13*60, 5],
    [13*60, 14*60, 6],
    [14*60, 15*60, 7],
    [15*60, 16*60, 8],
    [16*60, 17*60, 9],
  ];
  for (const [start, end, p] of slots) {
    if (mins >= start && mins < end) return p;
  }
  return null;
}

function getPeriodTime(p) {
  return PERIODS[p - 1] ? `${PERIODS[p-1].start} – ${PERIODS[p-1].end} น.` : '';
}

function formatThaiTime(d) {
  const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const daysEn = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const day = lang === 'th' ? days[d.getDay()] : daysEn[d.getDay()];
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  const ss = String(d.getSeconds()).padStart(2,'0');
  return `${day} ${hh}:${mm}:${ss}`;
}

// live clock
function updateClock() {
  const d = getThaiTime();
  const el = document.getElementById('live-time');
  if (el) el.textContent = `⏰ ${t('now')}: ${formatThaiTime(d)}`;
}
setInterval(updateClock, 1000);
updateClock();

//  QUERY PARSER
// ══════════════════════════════════════════════════
function extractClassNumber(query) {
  const patterns = [
    /ม\.?\s*5\s*[./\-]\s*(\d{1,2})/i,
    /5\s*[./\-]\s*(\d{1,2})/,
    /ห้อง\s*5(\d{1,2})/,
    /m\.?5\s*[./\-]\s*(\d{1,2})/i,
    /class\s*5[./\-]?(\d{1,2})/i,
    /grade\s*11[./\-\s]*(\d{1,2})/i,
  ];
  for (const p of patterns) {
    const m = query.match(p);
    if (m) {
      const n = parseInt(m[1]);
      if (n >= 1 && n <= 14) return n;
    }
  }
  return null;
}

// Extract a day of week from the query (returns 1-5 for Mon-Fri, or null)
function extractDay(query) {
  const q = query.toLowerCase();
  const dayMap = [
    { keys: ['จันทร์','monday','mon','วันจันทร์'], val: 1 },
    { keys: ['อังคาร','tuesday','tue','วันอังคาร'], val: 2 },
    { keys: ['พุธ','wednesday','wed','วันพุธ'], val: 3 },
    { keys: ['พฤหัส','thursday','thu','วันพฤหัส'], val: 4 },
    { keys: ['ศุกร์','friday','fri','วันศุกร์'], val: 5 },
  ];
  for (const d of dayMap) {
    if (d.keys.some(k => q.includes(k))) return d.val;
  }
  return null;
}

// Extract a specific period number from the query (returns 1-9 or null)
function extractPeriod(query) {
  const q = query.toLowerCase();
  // Thai ordinal words
  const wordMap = [
    { keys: ['แรก','ที่หนึ่ง','หนึ่ง','first','1st','one'], val: 1 },
    { keys: ['ที่สอง','สอง','second','2nd','two'], val: 2 },
    { keys: ['ที่สาม','สาม','third','3rd','three'], val: 3 },
    { keys: ['ที่สี่','สี่','fourth','4th','four'], val: 4 },
    { keys: ['ที่ห้า','ห้า','fifth','5th','five'], val: 5 },
    { keys: ['ที่หก','หก','sixth','6th','six'], val: 6 },
    { keys: ['ที่เจ็ด','เจ็ด','seventh','7th','seven'], val: 7 },
    { keys: ['ที่แปด','แปด','eighth','8th','eight'], val: 8 },
    { keys: ['ที่เก้า','เก้า','ninth','9th','nine'], val: 9 },
  ];
  // First try explicit "คาบที่ N" or "period N"
  const numMatch = q.match(/(?:คาบ(?:ที่)?\s*|period\s*)(\d)/);
  if (numMatch) return parseInt(numMatch[1]);
  // Then try word-based, but only when "คาบ" or "period" is also present
  if (q.includes('คาบ') || q.includes('period')) {
    for (const w of wordMap) {
      if (w.keys.some(k => q.includes(k))) return w.val;
    }
  }
  return null;
}

function isAskingAllDay(q) {
  const kw = ['ทั้งวัน','ตลอดวัน','all day','full schedule','ตารางวันนี้','schedule today','มีอะไรบ้าง','ทุกคาบ','all period'];
  return kw.some(k => q.toLowerCase().includes(k));
}

function buildScheduleCard(classNum, dayNum, periodNum, contextLabel) {
  const schedule = SCHEDULES[classNum];
  const roomNo = CLASS_ROOMS[classNum];
  const daySchedule = schedule[dayNum];
  if (!daySchedule) return { text: `ไม่พบข้อมูลสำหรับวันนี้` };

  const cl = daySchedule[periodNum];
  const dayLabelTH = ['','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์'][dayNum] || '';
  const dayLabelEN = ['','Monday','Tuesday','Wednesday','Thursday','Friday'][dayNum] || '';
  const dayLabel = lang === 'th' ? dayLabelTH : dayLabelEN;

  if (!cl) {
    return { text: lang === 'th'
      ? `ม.5/${classNum} ไม่มีคาบเรียนในวัน${dayLabel} คาบที่ ${periodNum}`
      : `M.5/${classNum} has no class on ${dayLabel} Period ${periodNum}.`
    };
  }

  if (periodNum === 5) {
    return { text: lang === 'th'
      ? `⏰ วัน${dayLabel} คาบที่ 5 เป็นเวลาพักกลางวัน (12:10 – 13:00 น.)`
      : `⏰ ${dayLabel} Period 5 is lunch break (12:10 – 13:00).`
    };
  }

  const subj = lang === 'th' ? cl.subjectTH : cl.subjectEN;
  const intro = lang === 'th'
    ? `ม.5/${classNum} วัน${dayLabel} ${contextLabel}:`
    : `M.5/${classNum} on ${dayLabel} ${contextLabel}:`;

  return {
    html: `<div>${intro}</div>
    <div class="result-card">
      <span class="period-badge">${t('period')} ${periodNum} · ${getPeriodTime(periodNum)}</span>
      <div class="subject">${subj}</div>
      ${cl.teacher ? `<div class="detail">${t('teacher')}: <span>${cl.teacher}</span></div>` : ''}
      <div class="detail">${t('room')}: <span>${cl.room || roomNo}</span></div>
      <div class="detail">${t('time')}: <span>${getPeriodTime(periodNum)}</span></div>
    </div>`
  };
}

function buildAllDayCard(classNum, dayNum) {
  const schedule = SCHEDULES[classNum];
  const daySchedule = schedule[dayNum];
  const dayLabelTH = ['','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์'][dayNum] || '';
  const dayLabelEN = ['','Monday','Tuesday','Wednesday','Thursday','Friday'][dayNum] || '';
  const dayLabel = lang === 'th' ? dayLabelTH : dayLabelEN;
  const title = lang === 'th'
    ? `ตารางเรียนวัน${dayLabel} ม.5/${classNum}`
    : `Schedule for ${dayLabel} – M.5/${classNum}`;

  let html = `<div style="margin-top:4px"><b>${title}</b></div>`;
  let hasAny = false;
  for (let p = 1; p <= 9; p++) {
    const cl = daySchedule[p];
    if (!cl) continue;
    hasAny = true;
    const subj = lang === 'th' ? cl.subjectTH : cl.subjectEN;
    html += `<div class="result-card" style="margin-top:8px">
      <span class="period-badge">${t('period')} ${p} · ${getPeriodTime(p)}</span>
      <div class="subject">${subj}</div>
      ${cl.teacher ? `<div class="detail">${t('teacher')}: <span>${cl.teacher}</span></div>` : ''}
      ${cl.room ? `<div class="detail">${t('room')}: <span>${cl.room}</span></div>` : ''}
    </div>`;
  }
  if (!hasAny) html += `<div style="margin-top:8px;opacity:0.6">${lang==='th'?'ไม่มีข้อมูลคาบเรียน':'No class data found.'}</div>`;
  return { html };
}

function buildResponse(query) {
  const classNum = extractClassNumber(query);
  const thai = getThaiTime();
  const todayDow = thai.getDay(); // 0=Sun
  const currentPeriod = getCurrentPeriod();

  // ── Just asking what period it is now ──
  if (!classNum && (query.includes('คาบ') || query.toLowerCase().includes('period')) && !extractDay(query)) {
    if (!currentPeriod) return { text: t('noClass') };
    return {
      text: lang === 'th'
        ? `⏰ ขณะนี้เป็น **คาบที่ ${currentPeriod}** (${getPeriodTime(currentPeriod)})`
        : `⏰ It is currently **Period ${currentPeriod}** (${getPeriodTime(currentPeriod)})`
    };
  }

  if (!classNum) return { text: t('notFound') };

  const schedule = SCHEDULES[classNum];
  const roomNo = CLASS_ROOMS[classNum];

  // ── Extract advance day & period from query ──
  const askedDay    = extractDay(query);    // null = not specified → use today
  const askedPeriod = extractPeriod(query); // null = not specified → use current

  // Resolve which day we're looking at
  const targetDay = askedDay !== null ? askedDay : todayDow;

  // Weekend check (only relevant for "today" queries)
  if (askedDay === null && (todayDow === 0 || todayDow === 6)) {
    return { text: lang === 'th'
      ? `📅 วันนี้เป็นวันหยุดสุดสัปดาห์ ไม่มีการเรียนการสอนสำหรับ ม.5/${classNum}`
      : `📅 Today is a weekend. No classes for M.5/${classNum}.`
    };
  }

  // If asking for a full day schedule
  if (isAskingAllDay(query)) {
    return buildAllDayCard(classNum, targetDay);
  }

  // ── Advance query: specific day + specific period ──
  if (askedDay !== null && askedPeriod !== null) {
    const dayLabelTH = ['','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์'][askedDay];
    const contextLabel = lang === 'th' ? `คาบที่ ${askedPeriod}` : `Period ${askedPeriod}`;
    return buildScheduleCard(classNum, askedDay, askedPeriod, contextLabel);
  }

  // ── Advance query: specific day, no period → show full day ──
  if (askedDay !== null && askedPeriod === null) {
    return buildAllDayCard(classNum, askedDay);
  }

  // ── Advance query: specific period, today ──
  if (askedDay === null && askedPeriod !== null) {
    const contextLabel = lang === 'th' ? `คาบที่ ${askedPeriod}` : `Period ${askedPeriod}`;
    return buildScheduleCard(classNum, targetDay, askedPeriod, contextLabel);
  }

  // ── Default: current time ──
  if (!currentPeriod) {
    return {
      text: lang === 'th'
        ? `🌙 ขณะนี้อยู่นอกเวลาเรียน ไม่มีคาบเรียนสำหรับ ม.5/${classNum}`
        : `🌙 School is not currently in session. No active class for M.5/${classNum}.`
    };
  }

  const contextNow = lang === 'th' ? 'กำลังเรียน' : 'is currently in';
  return buildScheduleCard(classNum, todayDow, currentPeriod, contextNow);
}

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (isHtml) {
    bubble.innerHTML = content;
  } else {
    // bold support via **
    bubble.innerHTML = content
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  wrap.appendChild(av);
  wrap.appendChild(bubble);
  chatBox.appendChild(wrap);
  chatBox.scrollTop = chatBox.scrollHeight;
  return wrap;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  wrap.id = 'typing-indicator';
  wrap.innerHTML = `
    <div class="avatar ai-avatar">🤖</div>
    <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
  `;
  chatBox.appendChild(wrap);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// Welcome message
function showWelcome() {
  const suggs = t('suggests');
  const suggHTML = `<div class="suggestions">${suggs.map(s => `<button class="suggest-btn" onclick="sendQuery('${s}')">${s}</button>`).join('')}</div>`;
  const welcomeText = t('welcome').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  addMsg('ai', `<div>${welcomeText}</div>${suggHTML}`, true);
}

function handleSend() {
  const inp = document.getElementById('user-input');
  const query = inp.value.trim();
  if (!query) return;
  inp.value = '';
  sendQuery(query);
}

function sendQuery(query) {
  addMsg('user', query);
  addTyping();

  setTimeout(() => {
    removeTyping();
    const res = buildResponse(query);
    if (res.html) {
      addMsg('ai', res.html, true);
    } else {
      addMsg('ai', res.text);
    }
  }, 600);
}

// Enter key
document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

// ══════════════════════════════════════════════════
//  LANGUAGE SWITCHER
// ══════════════════════════════════════════════════
function setLang(l) {
  lang = l;
  document.getElementById('btn-th').className = l === 'th' ? 'active' : '';
  document.getElementById('btn-en').className = l === 'en' ? 'active' : '';
  document.getElementById('hdr-title').textContent = t('hdrTitle');
  document.getElementById('hdr-sub').textContent = t('hdrSub');
  document.getElementById('user-input').placeholder = t('placeholder');
  document.getElementById('hint-text').textContent = t('hint');
  document.documentElement.lang = l;
  // Clear and re-show welcome
  chatBox.innerHTML = '';
  showWelcome();
}

// Init
showWelcome();
</script>
</body>
